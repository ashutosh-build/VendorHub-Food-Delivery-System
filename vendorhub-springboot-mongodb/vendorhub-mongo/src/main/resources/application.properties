# ╔══════════════════════════════════════════╗
# ║  VendorHub — Spring Boot + MongoDB       ║
# ╚══════════════════════════════════════════╝

server.port=8080

# ─── MongoDB ──────────────────────────────────────────
# Local MongoDB (default — no password)
spring.data.mongodb.uri=mongodb://localhost:27017/vendorhub
spring.data.mongodb.database=vendorhub

# If your MongoDB has username/password, use this instead:
# spring.data.mongodb.uri=mongodb://username:password@localhost:27017/vendorhub

# ─── JWT ──────────────────────────────────────────────
app.jwt.secret=VendorHubMongoSecretKey2024ChangeThisInProduction1234567890ABCDEFGH
app.jwt.expiration-ms=604800000
app.jwt.refresh-expiration-ms=2592000000

# ─── CORS ─────────────────────────────────────────────
app.cors.origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173

# ─── Platform Config ──────────────────────────────────
app.platform.fee-percent=15
app.delivery.earning=40

# ─── File Upload ──────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ─── Logging ──────────────────────────────────────────
logging.level.com.vendorhub=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.mongodb=WARN
# ─── Email (Gmail) ────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-password-here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Development   men email bhejne ki zaroorat nahi — console pe dikhega
# Upar EmailService mein log.info se OTP console pe print hoga